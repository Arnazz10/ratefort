server:
  port: 8080

spring:
  application:
    name: ratefort
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ratefort}
    username: ${DB_USERNAME:ratefort}
    password: ${DB_PASSWORD:ratefort}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: request_proxy
          uri: ${DOWNSTREAM_URL:https://jsonplaceholder.typicode.com}
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

ratefort:
  security:
    valid-api-keys: ${VALID_API_KEYS:my-secret-key}
  stats:
    flush-interval-ms: 30000
  rules:
    - path: "/api/posts/**"
      limit: 10
      duration-seconds: 60
      algorithm: TOKEN_BUCKET
    - path: "/api/comments/**"
      limit: 5
      duration-seconds: 60
      algorithm: SLIDING_WINDOW
